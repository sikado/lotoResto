name: Blob storage website CI

on:
  push:
    branches: [azureDeploy]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: azure/login@v1
        with:
          creds: ${{ secrets.AZ_RG_TOKEN }}

      - name: Upload to blob storage
        uses: azure/CLI@v1
        with:
          azcliversion: 2.18.0
          inlineScript: |
            az storage blob upload-batch --account-name lotoresto -d '$web' -s src
